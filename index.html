<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZA Streamers Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0; 
            padding: 0; 
            background: #0f0f0f; 
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .overlay { 
            position: relative;
            z-index: 2;
            background: rgba(15,15,15,0.88); 
            min-height: 100vh; 
            padding: 40px 20px; 
        }

        h1 { 
            text-align: center; 
            color: #ffcc00; 
            font-size: 3rem; 
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ffcc00;
        }
        .subtitle { 
            text-align: center; 
            color: #bbb; 
            margin-bottom: 40px; 
            font-size: 1.3rem; 
        }
        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto;
            position: relative;
            z-index: 3;
        }
        .card {
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.3s; 
            border: 2px solid #ffcc00;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 30px rgba(255,204,0,0.3); 
        }
        .card-img {
            height: 180px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .card-img img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 8px;
        }
        .card-body { padding: 20px; }
        .card-body h2 { margin: 0 0 12px 0; color: #ffcc00; }
        .card-body p { line-height: 1.6; color: #ccc; }
        .link-btn {
            display: block; text-align: center; background: #ffcc00; color: #000;
            padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px;
            text-decoration: none; transition: 0.3s;
        }
        .link-btn:hover { background: #ffd633; transform: scale(1.05); }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="overlay">
        <h1>🇿🇦 Streamers Hub</h1>
        <p class="subtitle">From the bush to the stream — meet the legends keeping Mzansi entertained</p>
        
        <div class="grid" id="streamer-grid">
            <!-- Cards will be inserted here by JavaScript -->
        </div>
		        <p style="text-align:center; margin-top:60px; color:#666; font-size:0.9rem;">
            Made with ❤️ for South African creators • Braai and Biltong recommended
        </p>
    </div>

    <script>
        // ==================== PARTICLES ====================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: 0, y: 0, lastMove: Date.now() };
        let hue = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.1 + 0.7;
                this.speedX = Math.random() * 0.35 - 0.175;
                this.speedY = Math.random() * 0.35 - 0.175;
            }
            update() {
                const now = Date.now();
                const idleTime = now - mouse.lastMove;
                let damping = 1;
                if (idleTime > 1000) {
                    damping = Math.max(0.02, 1 - (idleTime - 1000) / 10000);
                }

                this.x += this.speedX * damping;
                this.y += this.speedY * damping;

                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 500 && damping > 0.1) {
                    this.speedX += dx / 80000;
                    this.speedY += dy / 80000;
                }

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `hsl(${hue}, 100%, 75%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 400; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = 'rgba(15, 15, 15, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            hue = (hue + 0.8) % 360;

            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animate);
        }

        // ==================== RANDOM CARD ORDER ====================
        const streamers = [
            {
                name: "Whistler__",
                img: "https://static-cdn.jtvnw.net/jtv_user_pictures/fd349aeb-8bef-4cee-9a67-f7ccb6905a0d-profile_image-300x300.png",
                desc: "Twitch variety gamer, tech enthusiast and 3D printing legend.",
                link: "https://www.twitch.tv/whistler__",
                platform: "Twitch"
            },
            {
                name: "The Mork Rock Show",
                img: "https://yt3.googleusercontent.com/ytc/AIdro_mExPUOIHimtLme2dLkeUKDl5OgI_-uJ-uxWHWBio9cgg=s160-c-k-c0x00ffffff-no-rj",
                desc: "Comedy, news and entertainment with authentic South African flavour.",
                link: "https://www.youtube.com/@TheMorkRockShow",
                platform: "YouTube"
            },
            {
                name: "Recon1 Outdoors",
                img: "https://yt3.googleusercontent.com/XZYSzNeYl6mcj8bVkpLzDrKLoaZcNNUocMLEpZnL6mx4HO9pLwcKK__9BVw_j_2uWn-f8-5Qfw=s160-c-k-c0x00ffffff-no-rj",
                desc: "Solo camping, off-road adventures and real bush life content.",
                link: "https://www.youtube.com/@Recon1Outdoors",
                platform: "YouTube"
            },
            {
                name: "Renaldo Gous",
                img: "https://yt3.googleusercontent.com/MI48-tI3CMmd1yPJrwXEfKU0CsuVYfRwomiEVFz0oir3BUFaUIXBbzfbdmkB8sY2Wdmwgblq=s160-c-k-c0x00ffffff-no-rj",
                desc: "Leading political commentator in SA. Straight talk, zero filter.",
                link: "https://www.youtube.com/@RenaldoG",
                platform: "YouTube"
            },
            {
                name: "Ghoststomper",
                img: "https://yt3.googleusercontent.com/ytc/AIdro_kwfsi_CsUiRAk04-vD6X5RGXAPpOybCPTUiHbNpRVXag=s160-c-k-c0x00ffffff-no-rj",
                desc: "Psytrance Sets, Short experimental music, music vids and other random stuff.",
                link: "https://www.youtube.com/@GhostStomper",
                platform: "YouTube"
            },
            {
                name: "The Upper Room",
                img: "https://yt3.googleusercontent.com/mCztsnhiX0NKUW-WaDBwup6oakRifDnwETZ2KO5G9GsqJ_paeJpVRDIcOARCbPMhOYpzbC8uEw=s160-c-k-c0x00ffffff-no-rj",
                desc: "Expect witty banter, deep dives, and perspectives that actually stick with you.",
                link: "https://www.youtube.com/@TheUpperRoom-TV",
                platform: "YouTube"
            }
        ];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function renderCards() {
            const grid = document.getElementById('streamer-grid');
            grid.innerHTML = '';

            const shuffled = shuffle([...streamers]);

            shuffled.forEach(s => {
                const cardHTML = `
                    <div class="card">
                        <div class="card-img"><img src="${s.img}" alt="${s.name}"></div>
                        <div class="card-body">
                            <h2>${s.name}</h2>
                            <p>${s.desc}</p>
                            <a href="${s.link}" target="_blank" class="link-btn">Watch on ${s.platform} →</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // Initialize everything
        window.addEventListener('load', () => {
            resize();
            initParticles();
            animate();
            renderCards();
        });

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.lastMove = Date.now();
        });
    </script>
</body>
</html>
