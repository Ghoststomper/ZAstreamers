<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZA Streamers Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0; 
            padding: 0; 
            background: #0f0f0f; 
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .overlay { 
            position: relative;
            z-index: 2;
            background: rgba(15,15,15,0.88); 
            min-height: 100vh; 
            padding: 40px 20px; 
        }

        h1 { 
            text-align: center; 
            color: #ffcc00; 
            font-size: 3rem; 
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ffcc00;
        }
        .subtitle { 
            text-align: center; 
            color: #bbb; 
            margin-bottom: 40px; 
            font-size: 1.3rem; 
        }
        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; 
            max-width: 6000px; 
            margin: 0 auto;
            position: relative;
            z-index: 4;
        }
        .card {
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.3s; 
            border: 2px solid #ffcc00;
            cursor: grab;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 30px rgba(255,204,0,0.3); 
        }
        .card:active { cursor: grabbing; }
        .card-img {
            height: 180px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .card-img img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 8px;
        }
        .card-body { padding: 20px; }
        .card-body h2 { margin: 0 0 12px 0; color: #ffcc00; }
        .card-body p { line-height: 1.6; color: #ccc; }
        .link-btn {
            display: block; text-align: center; background: #ffcc00; color: #000;
            padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px;
            text-decoration: none; transition: 0.3s;
        }
        .link-btn:hover { background: #ffd633; transform: scale(1.05); }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

        <h1>🇿🇦 Streamers Hub</h1>
        <p class="subtitle">From the bush to the stream — meet the legends keeping Mzansi entertained</p>

            Drag cards to reorder • Your order is saved automatically
        </p>

            <!-- Cards inserted by JS -->
        </div>

        <p style="text-align:center; margin-top:60px; color:#666; font-size:0.9rem;">
            Made with ❤️ for South African creators • Braai and Biltong recommended

    <script>
        // ==================== PARTICLES ====================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: 0, y: 0, lastMove: Date.now() };
        let hue = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(300, Math.floor(window.innerWidth * window.innerHeight / 4000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(15,15,15,0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            hue = (hue + 0.8) % 360;

            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animate);
        }

             {

        // ==================== DRAG & DROP + SAVED ORDER ====================
        const STORAGE_KEY = 'zaStreamersOrder';

        function getSavedOrder() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : null;
        }

        function saveOrder(order) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(order));
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function renderCards() {
            const grid = document.getElementById('streamer-grid');
            grid.innerHTML = '';

            let orderedStreamers = [...streamers];
            const savedOrder = getSavedOrder();

            if (savedOrder) {
                orderedStreamers.sort((a, b) => {
                    const indexA = savedOrder.indexOf(a.name);
                    const indexB = savedOrder.indexOf(b.name);
                    if (indexA === -1) return 1;
                    if (indexB === -1) return -1;
                    return indexA - indexB;
                });
            } else {
                orderedStreamers = shuffle([...streamers]);
            }

            orderedStreamers.forEach(s => {
                const cardHTML = `
                    <div class="card" draggable="true" data-name="${s.name}">
                        <div class="card-img"><img src="${s.img}" alt="${s.name}" loading="lazy"></div>
                        <div class="card-body">
                            <h2>${s.name}</h2>
                            <p>${s.desc}</p>
                            <a href="${s.link}" target="_blank" class="link-btn">Watch on ${s.platform} →</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });

            addDragListeners();
        }

        function addDragListeners() {
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', card.dataset.name);
                    card.style.opacity = '0.6';
                });

                card.addEventListener('dragend', () => {
                    card.style.opacity = '1';
                });

                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    card.style.borderColor = '#ffd633';
                    card.style.transform = 'scale(1.03)';
                });

                card.addEventListener('dragleave', () => {
                    card.style.borderColor = '#ffcc00';
                    card.style.transform = 'scale(1)';
                });

                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const draggedName = e.dataTransfer.getData('text/plain');
                    const targetName = card.dataset.name;

                    if (draggedName === targetName) return;

                    const currentOrder = Array.from(document.querySelectorAll('.card'))
                        .map(c => c.dataset.name);

                    const draggedIndex = currentOrder.indexOf(draggedName);
                    const targetIndex = currentOrder.indexOf(targetName);

                    currentOrder.splice(draggedIndex, 1);
                    currentOrder.splice(targetIndex, 0, draggedName);

                    saveOrder(currentOrder);
                    renderCards();
                });
            });
        }

        // Reset button
        function addResetButton() {
            const resetBtn = document.createElement('button');
            resetBtn.textContent = '🔄 Reset Order';
            resetBtn.style.cssText = `
                position: fixed; bottom: 25px; right: 25px; 
                padding: 12px 20px; background: #ffcc00; color: #000; 
                border: none; border-radius: 8px; font-weight: bold; 
                cursor: pointer; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            `;
            resetBtn.onclick = () => {
                localStorage.removeItem(STORAGE_KEY);
                renderCards();
            };
            document.body.appendChild(resetBtn);
        }

        // Initialize everything
        window.addEventListener('load', () => {
            resize();
            initParticles();
            animate();
            renderCards();
            addResetButton();

            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });
        });
    </script>
